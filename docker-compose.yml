services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: condohub
      POSTGRES_PASSWORD: condohub
      POSTGRES_DB: condohub
    ports:
      # Host 5544 (5432 costuma estar ocupado por Postgres local). Interno segue 5432.
      - "5544:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U condohub"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: ./backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      # environment tem precedência sobre env_file → garante prod no container.
      NODE_ENV: production
      DATABASE_URL: postgresql://condohub:condohub@db:5432/condohub?schema=public
      REDIS_URL: redis://redis:6379
    ports:
      - "3333:3333"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build: ./frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:3333/api
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  pgdata:
  redisdata:
