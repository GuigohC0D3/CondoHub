services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: condohub
      POSTGRES_PASSWORD: condohub
      POSTGRES_DB: condohub
    ports:
      # Host 5544 (5432 costuma estar ocupado por Postgres local). Interno segue 5432.
      - "5544:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U condohub"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: ./backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      # environment tem precedência sobre env_file → garante prod no container.
      NODE_ENV: production
      DATABASE_URL: postgresql://condohub:condohub@db:5432/condohub?schema=public
      REDIS_URL: redis://redis:6379
    ports:
      - "3333:3333"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3333/health/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  web:
    build: ./frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:3333/api
    ports:
      - "5173:80"
    depends_on:
      - api

  # Backup automático do Postgres (pg_dump em loop, com retenção).
  db-backup:
    image: postgres:16-alpine
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGHOST: db
      PGUSER: condohub
      PGPASSWORD: condohub
      PGDATABASE: condohub
      BACKUP_INTERVAL: "86400"      # 24h entre backups
      BACKUP_RETENTION_DAYS: "7"
    volumes:
      - ./backups:/backups
      - ./scripts/db-backup.sh:/usr/local/bin/db-backup.sh:ro
    entrypoint: ["sh", "-c", "while true; do /usr/local/bin/db-backup.sh || echo '[backup] FALHOU'; sleep \"$$BACKUP_INTERVAL\"; done"]

volumes:
  pgdata:
  redisdata:
